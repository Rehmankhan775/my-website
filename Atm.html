<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Bank ATM</title>
    <style>
        :root {
            --bg-dark: #1a1c2c;
            --card-bg: #24283b;
            --accent-green: #4ade80;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-light);
        }

        .atm-container {
            width: 350px;
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        /* Header Area */
        .header {
            background-color: #334155;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            color: #93c5fd;
        }

        .screen {
            padding: 25px;
            min-height: 300px;
            text-align: center;
        }

        /* Forms & Inputs */
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background: #334155;
            border: none;
            padding: 20px 10px;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
        }

        .btn:hover { background: #475569; }
        .btn-primary { background: var(--accent-green); color: black; font-weight: bold; width: 100%; margin-top: 10px; }

        .balance-display {
            font-size: 2rem;
            color: var(--accent-green);
            margin: 20px 0;
            font-weight: bold;
        }

        .receipt-box {
            border: 1px solid var(--accent-green);
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="atm-container">
    <div class="header">🏦 SECURE BANK ATM</div>
    
    <div class="screen">
        <div id="login-screen">
            <h3>🔒 Enter Your PIN</h3>
            <input type="password" id="pin-input" placeholder="* * * *" maxlength="4">
            <p style="font-size: 0.7rem; color: #94a3b8;">Default PIN: 1234</p>
            <button class="btn btn-primary" onclick="handleLogin()">LOGIN</button>
        </div>

        <div id="menu-screen" class="hidden">
            <p>Current Balance</p>
            <div class="balance-display" id="main-balance-text">$5000.00</div>
            <div class="menu-grid">
                <button class="btn" onclick="showWithdraw()">💸<br>Withdraw</button>
                <button class="btn" onclick="alert('Coming Soon!')">💰<br>Deposit</button>
                <button class="btn" onclick="showBalance()">📊<br>Balance</button>
                <button class="btn" onclick="logout()">🚪<br>Exit</button>
            </div>
        </div>

        <div id="withdraw-screen" class="hidden">
            <h3>Enter Amount</h3>
            <input type="number" id="withdraw-amount" placeholder="$0.00">
            <button class="btn btn-primary" onclick="processWithdraw()">CONFIRM</button>
            <button class="btn" style="width:100%; margin-top:5px;" onclick="showMenu()">Cancel</button>
        </div>

        <div id="success-screen" class="hidden">
            <h3 style="color: var(--accent-green);">Withdrawal Successful!</h3>
            <div class="receipt-box" id="receipt-content">
                </div>
            <button class="btn btn-primary" onclick="showMenu()">BACK TO MENU</button>
        </div>
    </div>
</div>

<script>
    let balance = 5000.00;
    const correctPin = "1234";

    function handleLogin() {
        const pin = document.getElementById('pin-input').value;
        if (pin === correctPin) {
            showMenu();
        } else {
            alert("Wrong PIN! Try 1234");
        }
    }

    function showMenu() {
        hideAll();
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('main-balance-text').innerText = `$${balance.toFixed(2)}`;
    }

    function showWithdraw() {
        hideAll();
        document.getElementById('withdraw-screen').classList.remove('hidden');
    }

    function processWithdraw() {
        const amount = parseFloat(document.getElementById('withdraw-amount').value);
        if (amount > 0 && amount <= balance) {
            const oldBalance = balance;
            balance -= amount;
            showReceipt(amount, oldBalance, balance);
        } else {
            alert("Invalid amount or Insufficient balance!");
        }
    }

    function showReceipt(amount, oldBal, newBal) {
        hideAll();
        const now = new Date();
        const receiptHtml = `
            <div style="display:flex; justify-content:space-between;"><span>Transaction:</span> <span>Withdrawal</span></div>
            <div style="display:flex; justify-content:space-between;"><span>Amount:</span> <span>$${amount.toFixed(2)}</span></div>
            <div style="display:flex; justify-content:space-between;"><span>Previous:</span> <span>$${oldBal.toFixed(2)}</span></div>
            <hr style="border:0; border-top:1px solid #334155;">
            <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>New Balance:</span> <span>$${newBal.toFixed(2)}</span></div>
            <br>
            <div style="font-size: 0.7rem; text-align:center; color:#94a3b8;">
                Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}
            </div>
        `;
        document.getElementById('receipt-content').innerHTML = receiptHtml;
        document.getElementById('success-screen').classList.remove('hidden');
    }

    function logout() {
        location.reload();
    }

    function hideAll() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('withdraw-screen').classList.add('hidden');
        document.getElementById('success-screen').classList.add('hidden');
    }
</script>

</body>
</html>
