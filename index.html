<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR | Sher Alam Khan Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --gray: #1a1a1a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); }
        .hidden { display: none !important; }
        
        /* Premium Background */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1200');
            background-size: cover; z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .btn { padding: 8px 15px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 0.9rem; }
        .btn:hover { background: var(--gold); color: #000; }

        /* Sections */
        .login-card { background: rgba(20,20,20,0.95); padding: 40px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; width: 350px; margin: 100px auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding: 15px 0; margin-bottom: 20px; }
        
        /* Menu Grid */
        .category-title { color: var(--gold); border-left: 4px solid var(--gold); padding-left: 10px; margin: 30px 0 15px; font-family: 'Playfair Display'; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .item-card { background: #151515; padding: 15px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .item-card h3 { font-size: 0.95rem; margin-bottom: 5px; color: #efefef; }
        .item-card .price { color: var(--gold); font-weight: bold; margin-bottom: 10px; }

        /* Receipt */
        #receipt { background: #fff; color: #000; padding: 30px; max-width: 400px; margin: 20px auto; font-family: monospace; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .receipt-header { text-align: center; border-bottom: 1px dashed #000; margin-bottom: 15px; padding-bottom: 10px; }
        
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        .history-table th, .history-table td { padding: 10px; border: 1px solid #333; text-align: left; }
    </style>
</head>
<body>

    <section id="login-sec">
        <div class="login-card">
            <h1 style="color:var(--gold); font-family:'Playfair Display'">SKR</h1>
            <p style="margin-bottom:20px; font-size:0.8rem">Sher Alam Khan Restaurant</p>
            <input type="text" id="u" placeholder="Admin ID" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #444">
            <input type="password" id="p" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px; background:#000; color:#fff; border:1px solid #444">
            <button class="btn" style="width:100%" onclick="doLogin()">Login</button>
        </div>
    </section>

    <section id="main-sec" class="hidden">
        <div class="container">
            <div class="header">
                <div>
                    <h1 style="color:var(--gold)">SKR RESTAURANT</h1>
                    <p style="font-size:0.7rem">Bhakkar Road, D.I.Khan | 0332-0797107</p>
                </div>
                <div>
                    <button class="btn" onclick="showHistory()"><i class="fas fa-list"></i> History</button>
                    <button class="btn" onclick="showCart()"><i class="fas fa-shopping-cart"></i> Cart (<span id="count">0</span>)</button>
                </div>
            </div>

            <div id="menu-container">
                </div>
        </div>
    </section>

    <section id="cart-sec" class="hidden">
        <div class="container">
            <button class="btn" onclick="goBack()">← Back</button>
            <div style="background:#1a1a1a; padding:20px; margin-top:20px; border-radius:10px; border:1px solid var(--gold)">
                <h2 style="color:var(--gold)">Review Order</h2>
                <div id="cart-list" style="margin:20px 0"></div>
                <div style="text-align:right">
                    <h3>Total: Rs. <span id="total-price">0</span></h3>
                    <button class="btn" style="background:var(--gold); color:#000; margin-top:15px" onclick="confirmOrder()">Confirm & Print</button>
                </div>
            </div>
        </div>
    </section>

    <section id="bill-sec" class="hidden">
        <div class="container">
            <div id="receipt">
                <div class="receipt-header">
                    <h2>SKR RESTAURANT</h2>
                    <p>D.I.Khan, Bhakkar Road</p>
                    <p id="bill-time" style="font-size:0.7rem"></p>
                </div>
                <div id="bill-items"></div>
                <div style="border-top:1px dashed #000; margin-top:10px; padding-top:10px">
                    <h3 style="display:flex; justify-content:space-between">TOTAL: <span>Rs. <span id="final-amt"></span></span></h3>
                </div>
                <center style="margin-top:20px">
                    <p>Thank you for choosing SKR!</p>
                    <button onclick="window.print()" style="margin-top:10px; padding:5px 10px">Print Bill</button>
                    <button onclick="newOrder()" style="margin-top:10px; padding:5px 10px">New Order</button>
                </center>
            </div>
        </div>
    </section>

    <section id="hist-sec" class="hidden">
        <div class="container">
            <button class="btn" onclick="goBack()">← Back</button>
            <div style="background:#1a1a1a; padding:20px; margin-top:20px; border-radius:10px">
                <h2 style="color:var(--gold)">Daily Sales Report</h2>
                <table class="history-table">
                    <thead><tr><th>Time</th><th>Order</th><th>Total</th></tr></thead>
                    <tbody id="hist-body"></tbody>
                </table>
                <div style="margin-top:20px; text-align:right; color:var(--gold)">
                    <h2>Grand Total: Rs. <span id="grand-total">0</span></h2>
                </div>
            </div>
        </div>
    </section>

    <script>
        // FULL MENU DATA (42 ITEMS FROM YOUR IMAGE)
        const fullMenu = [
            { cat: "Karahi & Shinwari", items: [
                { id: 1, name: "Chicken Karahi", price: 1600 },
                { id: 2, name: "Chicken Shinwari Karahi", price: 1600 },
                { id: 3, name: "Chicken Namkeen Karahi", price: 1600 },
                { id: 4, name: "Chicken Special Karahi", price: 2200 },
                { id: 5, name: "Chicken White Karahi", price: 2000 },
                { id: 6, name: "Chicken Green Karahi", price: 2000 },
                { id: 7, name: "Mutton Karahi", price: 2800 },
                { id: 8, name: "Mutton Shinwari Karahi", price: 2800 },
                { id: 9, name: "Mutton White Karahi", price: 3000 },
                { id: 10, name: "Mutton Boneless Karahi", price: 3200 },
                { id: 11, name: "Mutton Namkeen Karahi", price: 2800 }
            ]},
            { cat: "Rice & Pulao", items: [
                { id: 12, name: "Beef Pulao", price: 800 },
                { id: 13, name: "Mutton Namkeen Rice", price: 2800 },
                { id: 14, name: "Plain Rice (Chicken Sada)", price: 450 },
                { id: 15, name: "Chicken Fried Rice", price: 1200 }
            ]},
            { cat: "BBQ & Roasts", items: [
                { id: 16, name: "Mutton Roast (Full)", price: 2600 },
                { id: 17, name: "Mutton Tikka (1kg)", price: 2600 },
                { id: 18, name: "Mutton Masala", price: 2800 },
                { id: 19, name: "Mutton Handi", price: 3200 },
                { id: 20, name: "Steam Ran (1kg)", price: 2800 },
                { id: 21, name: "Sabat Dunba (1kg)", price: 2800 },
                { id: 22, name: "Chicken Broast", price: 500 },
                { id: 23, name: "Chicken Tikka Boti", price: 300 },
                { id: 24, name: "Chicken Malai Boti", price: 300 },
                { id: 25, name: "Chicken Achari Boti", price: 300 },
                { id: 26, name: "Dam Pookh", price: 1000 },
                { id: 27, name: "Chicken Kabab", price: 150 },
                { id: 28, name: "Reshmi Kabab", price: 150 }
            ]},
            { cat: "Fish & Seafood", items: [
                { id: 29, name: "Grill Fish", price: 1200 },
                { id: 30, name: "Fry Fish", price: 1000 },
                { id: 31, name: "Finger Fish", price: 1000 }
            ]},
            { cat: "Sides & Pulses", items: [
                { id: 32, name: "Daal Mash", price: 200 },
                { id: 33, name: "Mixed Sabzi", price: 200 },
                { id: 34, name: "Raita", price: 50 },
                { id: 35, name: "Paratha", price: 50 },
                { id: 36, name: "Chicken Corn Soup", price: 250 },
                { id: 37, name: "Chicken Hot Soup", price: 250 },
                { id: 38, name: "SK Special Sohan Halwa", price: 800 }
            ]},
            { cat: "Beverages", items: [
                { id: 39, name: "Sada Chai (Tea)", price: 50 },
                { id: 40, name: "Doodh Patti", price: 60 },
                { id: 41, name: "Green Tea", price: 40 },
                { id: 42, name: "Cold Drink / Water", price: 60 }
            ]}
        ];

        let cart = [];
        let sales = JSON.parse(localStorage.getItem('skr_sales')) || [];

        window.onload = () => { if(sessionStorage.getItem('skr_auth')) showMain(); };

        function doLogin() {
            if(document.getElementById('u').value==='admin' && document.getElementById('p').value==='1234') {
                sessionStorage.setItem('skr_auth','t');
                showMain();
            } else alert("Invalid Login");
        }

        function showMain() {
            toggle('main-sec');
            const container = document.getElementById('menu-container');
            container.innerHTML = fullMenu.map(c => `
                <h2 class="category-title">${c.cat}</h2>
                <div class="menu-grid">
                    ${c.items.map(i => `
                        <div class="item-card">
                            <div><h3>${i.name}</h3><p class="price">Rs. ${i.price}</p></div>
                            <button class="btn" onclick="addToCart(${i.id}, '${i.name}', ${i.price})">Add to Order</button>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            cart.push({id, name, price, uid: Date.now()});
            document.getElementById('count').innerText = cart.length;
        }

        function showCart() {
            if(!cart.length) return alert("Cart is empty");
            toggle('cart-sec');
            let total = 0;
            document.getElementById('cart-list').innerHTML = cart.map(i => {
                total += i.price;
                return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; padding-bottom:5px; border-bottom:1px solid #333">
                    <span>${i.name}</span>
                    <span>Rs. ${i.price} <i class="fas fa-trash" style="color:red; margin-left:10px; cursor:pointer" onclick="removeItem(${i.uid})"></i></span>
                </div>`;
            }).join('');
            document.getElementById('total-price').innerText = total;
        }

        function removeItem(uid) {
            cart = cart.filter(i => i.uid !== uid);
            document.getElementById('count').innerText = cart.length;
            cart.length ? showCart() : goBack();
        }

        function confirmOrder() {
            const total = cart.reduce((a,b)=>a+b.price, 0);
            const time = new Date().toLocaleString();
            const orderStr = cart.map(i=>i.name).join(", ");
            
            sales.push({time, order: orderStr, total});
            localStorage.setItem('skr_sales', JSON.stringify(sales));

            toggle('bill-sec');
            document.getElementById('bill-time').innerText = time;
            document.getElementById('bill-items').innerHTML = cart.map(i=>`<div style="display:flex; justify-content:space-between"><span>${i.name}</span><span>${i.price}</span></div>`).join('');
            document.getElementById('final-amt').innerText = total;
            cart = []; document.getElementById('count').innerText = 0;
        }

        function showHistory() {
            toggle('hist-sec');
            let grand = 0;
            document.getElementById('hist-body').innerHTML = sales.map(s => {
                grand += s.total;
                return `<tr><td>${s.time}</td><td>${s.order}</td><td>${s.total}</td></tr>`;
            }).join('');
            document.getElementById('grand-total').innerText = grand;
        }

        function newOrder() { toggle('main-sec'); }
        function goBack() { toggle('main-sec'); }
        function toggle(id) {
            ['login-sec','main-sec','cart-sec','bill-sec','hist-sec'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
