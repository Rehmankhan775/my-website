<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Taste | Order System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0f0f0f;
            --gray: #1a1a1a;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: var(--white); overflow-x: hidden; }
        
        /* Utility Classes */
        .hidden { display: none !important; }
        .btn { padding: 12px 25px; border: 2px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: 600; transition: var(--transition); border-radius: 5px; }
        .btn:hover { background: var(--gold); color: var(--dark); }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* --- Login Section --- */
        #login-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
        }
        .login-card {
            background: var(--gray);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        /* --- Menu Section --- */
        #menu-section { padding: 50px 0; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 30px; border-bottom: 1px solid var(--gold); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .food-card {
            background: var(--gray);
            border-radius: 10px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .food-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .food-card img { width: 100%; height: 180px; object-fit: cover; }
        .food-info { padding: 15px; text-align: center; }
        .food-info h3 { color: var(--gold); margin-bottom: 5px; }
        .price { font-weight: bold; display: block; margin-bottom: 15px; }

        /* --- Cart & Order Summary --- */
        .cart-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--gold);
            color: var(--dark);
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* --- Checkout Section --- */
        .checkout-box { background: var(--gray); padding: 30px; border-radius: 15px; margin-top: 20px; }
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }

        /* --- Bill/Invoice --- */
        #bill-receipt {
            background: #fff;
            color: #000;
            padding: 40px;
            max-width: 500px;
            margin: 40px auto;
            border-radius: 0;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .receipt-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 20px; }
        .receipt-footer { border-top: 2px dashed #000; margin-top: 20px; padding-top: 10px; text-align: center; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <section id="login-section">
        <div class="login-card fade-in">
            <h2>Royal Taste Login</h2>
            <p style="margin-bottom: 20px; font-size: 0.8rem; color: #888;">(Use: admin / 1234)</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="handleLogin()">Login to Order</button>
            <p id="login-error" style="color: red; margin-top: 10px; font-size: 0.9rem;"></p>
        </div>
    </section>

    <section id="menu-section" class="hidden">
        <div class="container fade-in">
            <div class="header-nav">
                <h1 style="font-family: 'Playfair Display'; color: var(--gold);">Welcome, <span id="user-display"></span></h1>
                <button class="btn" onclick="showCheckout()"><i class="fas fa-shopping-cart"></i> View Cart (<span id="cart-count">0</span>)</button>
            </div>

            <div class="grid" id="food-grid">
                </div>
        </div>
    </section>

    <section id="checkout-section" class="hidden">
        <div class="container fade-in">
            <button class="btn" onclick="showMenu()" style="margin-bottom: 20px;">← Back to Menu</button>
            <div class="checkout-box">
                <h2 style="color: var(--gold); margin-bottom: 20px;">Confirm Your Order</h2>
                <div id="order-list">
                    </div>
                <div style="margin-top: 20px; text-align: right;">
                    <h3>Total: Rs. <span id="order-total">0</span></h3>
                    <br>
                    <button class="btn" style="background: var(--gold); color: black;" onclick="processBill()">Confirm & Pay Bill</button>
                </div>
            </div>
        </div>
    </section>

    <section id="bill-section" class="hidden">
        <div class="container fade-in">
            <div id="bill-receipt">
                <div class="receipt-header">
                    <h2>ROYAL TASTE</h2>
                    <p>123 Luxury Road, Food City</p>
                    <p id="receipt-date"></p>
                </div>
                <div id="receipt-items">
                    </div>
                <div class="receipt-footer">
                    <h3>GRAND TOTAL: Rs. <span id="receipt-total"></span></h3>
                    <p style="margin-top: 15px;">Thank you for dining with us!</p>
                    <button class="btn" onclick="window.print()" style="margin-top: 15px; border-color: #000; color: #000;">Print Receipt</button>
                    <button class="btn" onclick="location.reload()" style="margin-top: 15px; border-color: #000; color: #000;">New Order</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 1. Data Setup
        const menuItems = [
            { id: 1, name: "Royal Beef Burger", price: 850, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" },
            { id: 2, name: "Margherita Pizza", price: 1200, img: "https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=500" },
            { id: 3, name: "Alfredo Pasta", price: 950, img: "https://images.unsplash.com/photo-1645112481338-3162699e159a?w=500" },
            { id: 4, name: "Club Sandwich", price: 650, img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=500" },
            { id: 5, name: "Molten Lava Cake", price: 450, img: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?w=500" },
            { id: 6, name: "Fresh Lime Soda", price: 250, img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=500" }
        ];

        let cart = [];
        let currentUser = "";

        // 2. Navigation Functions
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "admin" && pass === "1234") {
                currentUser = user;
                document.getElementById('user-display').innerText = user.toUpperCase();
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('menu-section').classList.remove('hidden');
                renderMenu();
            } else {
                document.getElementById('login-error').innerText = "Invalid credentials. Use admin/1234";
            }
        }

        function renderMenu() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = menuItems.map(item => `
                <div class="food-card">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="price">Rs. ${item.price}</span>
                        <button class="btn" onclick="addToCart(${item.id})">Add to Order</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            cart.push(item);
            document.getElementById('cart-count').innerText = cart.length;
            alert(`${item.name} added to cart!`);
        }

        function showCheckout() {
            if(cart.length === 0) return alert("Your cart is empty!");
            
            document.getElementById('menu-section').classList.add('hidden');
            document.getElementById('checkout-section').classList.remove('hidden');
            
            const list = document.getElementById('order-list');
            let total = 0;
            
            list.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div class="order-item">
                        <span>${item.name}</span>
                        <span>Rs. ${item.price}</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('order-total').innerText = total;
        }

        function showMenu() {
            document.getElementById('checkout-section').classList.add('hidden');
            document.getElementById('menu-section').classList.remove('hidden');
        }

        function processBill() {
            document.getElementById('checkout-section').classList.add('hidden');
            document.getElementById('bill-section').classList.remove('hidden');
            
            const receiptItems = document.getElementById('receipt-items');
            let total = 0;
            
            receiptItems.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span>${item.name}</span>
                        <span>${item.price}</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('receipt-total').innerText = total;
            document.getElementById('receipt-date').innerText = new Date().toLocaleString();
        }
    </script>
</body>
</html>
