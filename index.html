<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR | Sher Alam Khan Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #0f0f0f; --gray: #1a1a1a; --white: #ffffff; --red: #b30000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Background Design */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1534422298391-e4f8c170db0f?w=1200');
            background-size: cover; z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .btn { padding: 10px 20px; border: 2px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: 600; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: var(--dark); }

        /* Login */
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(26, 26, 26, 0.98); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 90%; max-width: 400px; }
        .login-card h1 { font-family: 'Playfair Display'; color: var(--gold); font-size: 2.5rem; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding: 15px 0; margin-bottom: 25px; }
        .header h1 { font-family: 'Playfair Display'; color: var(--gold); font-size: 2rem; }
        .header p { font-size: 0.8rem; color: #ccc; }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: rgba(30, 30, 30, 0.8); border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .item-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .item-card img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid var(--gold); }
        .item-info { padding: 15px; text-align: center; }
        .item-info h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--gold); }
        .item-info .price { font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 12px; }

        /* Checkout/Cart */
        .cart-box { background: var(--gray); padding: 25px; border-radius: 15px; border: 1px solid var(--gold); }
        .cart-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; align-items: center; }

        /* Receipt */
        #receipt { background: #fff; color: #000; padding: 30px; max-width: 400px; margin: 0 auto; font-family: monospace; border: 1px solid #000; }
        .receipt-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 15px; }
        .receipt-item { display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* History */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .history-table th, .history-table td { padding: 12px; border: 1px solid #444; text-align: left; }
        .history-table th { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <section id="login-section">
        <div class="login-card">
            <h1>SKR</h1>
            <p>Sher Alam Khan Restaurant</p>
            <input type="text" id="user" placeholder="Username (admin)">
            <input type="password" id="pass" placeholder="Password (1234)">
            <button class="btn" onclick="login()">Enter System</button>
        </div>
    </section>

    <section id="menu-section" class="hidden">
        <div class="container">
            <div class="header">
                <div>
                    <h1>SKR RESTAURANT</h1>
                    <p><i class="fas fa-map-marker-alt"></i> Bhakkar Road, D.I.Khan | Manager: 0332-0797107</p>
                </div>
                <div>
                    <button class="btn" onclick="viewHistory()"><i class="fas fa-history"></i> Sales</button>
                    <button class="btn" onclick="viewCart()"><i class="fas fa-shopping-cart"></i> Cart (<span id="count">0</span>)</button>
                </div>
            </div>
            <div class="menu-grid" id="grid"></div>
        </div>
    </section>

    <section id="cart-section" class="hidden">
        <div class="container">
            <button class="btn" onclick="backToMenu()">← Back to Menu</button>
            <div class="cart-box" style="margin-top:20px;">
                <h2 style="color:var(--gold); margin-bottom:15px;">Selected Items</h2>
                <div id="cart-list"></div>
                <div style="text-align:right; margin-top:20px;">
                    <h3>Total Amount: Rs. <span id="total-val">0</span></h3>
                    <button class="btn" style="background:var(--gold); color:black; margin-top:15px;" onclick="checkout()">Finalize & Print Bill</button>
                </div>
            </div>
        </div>
    </section>

    <section id="bill-section" class="hidden">
        <div class="container">
            <div id="receipt">
                <div class="receipt-header">
                    <h3>SKR RESTAURANT</h3>
                    <p>Bhakkar Road, D.I.Khan</p>
                    <p id="bill-date" style="font-size:0.7rem;"></p>
                </div>
                <div id="bill-items"></div>
                <div style="border-top:1px dashed #000; margin-top:10px; padding-top:10px;">
                    <h4 style="display:flex; justify-content:space-between;">TOTAL: <span>Rs. <span id="bill-total"></span></span></h4>
                </div>
                <center style="margin-top:20px;">
                    <p>Quality & Standard Center</p>
                    <button class="btn" onclick="window.print()" style="margin-top:10px; border-color:#000; color:#000;">Print</button>
                    <button class="btn" onclick="newOrder()" style="margin-top:10px; border-color:#000; color:#000;">New Order</button>
                </center>
            </div>
        </div>
    </section>

    <section id="history-section" class="hidden">
        <div class="container">
            <button class="btn" onclick="backToMenu()">← Back</button>
            <div class="cart-box" style="margin-top:20px;">
                <h2 style="color:var(--gold);">Owner's Sales History (24h)</h2>
                <table class="history-table">
                    <thead><tr><th>Time</th><th>Order Detail</th><th>Total (Rs.)</th></tr></thead>
                    <tbody id="hist-body"></tbody>
                </table>
                <div style="margin-top:20px; text-align:right; background:var(--gold); color:black; padding:15px; border-radius:5px;">
                    <h3>GRAND TOTAL SALES: Rs. <span id="grand-total">0</span></h3>
                </div>
                <button class="btn" onclick="clearHistory()" style="margin-top:15px; border-color:red; color:red;">Clear History</button>
            </div>
        </div>
    </section>

    <script>
        // Updated Menu Data from your Image
        const menu = [
            { id: 1, name: "Chicken Karahi", price: 1600, img: "https://images.unsplash.com/photo-1603496987351-f84a3ba5ec85?w=400" },
            { id: 2, name: "Mutton Karahi", price: 2800, img: "https://images.unsplash.com/photo-1545231027-63b3f162ad70?w=400" },
            { id: 3, name: "Mutton Shinwari Karahi", price: 2800, img: "https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=400" },
            { id: 4, name: "Beef Pulao", price: 800, img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400" },
            { id: 5, name: "Mutton Roast", price: 2800, img: "https://i.ibb.co/XkyVq7J/mutton-roast.jpg" }, // Used your mutton roast ref
            { id: 6, name: "Chicken Steam Roast", price: 500, img: "https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=400" },
            { id: 7, name: "Daal Mash", price: 200, img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400" },
            { id: 8, name: "Sabat Dunba (1kg)", price: 2800, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400" },
            { id: 9, name: "Chicken Tikka Boti", price: 300, img: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400" },
            { id: 10, name: "Karak Chai / Tea", price: 50, img: "https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?w=400" },
            { id: 11, name: "Mixed Sabzi", price: 200, img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" },
            { id: 12, name: "Cold Drink / Water", price: 60, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
        ];

        let cart = [];
        let history = JSON.parse(localStorage.getItem('skr_history')) || [];

        // Check Session on Load
        window.onload = function() {
            if(sessionStorage.getItem('logged') === 'true') {
                showSec('menu-section');
                renderMenu();
            }
        };

        function login() {
            if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
                sessionStorage.setItem('logged', 'true');
                showSec('menu-section');
                renderMenu();
            } else alert("Wrong ID/Pass!");
        }

        function renderMenu() {
            const grid = document.getElementById('grid');
            grid.innerHTML = menu.map(i => `
                <div class="item-card">
                    <img src="${i.img}">
                    <div class="item-info">
                        <h3>${i.name}</h3>
                        <span class="price">Rs. ${i.price}</span>
                        <button class="btn" onclick="addToCart(${i.id})">Add Item</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menu.find(i => i.id === id);
            cart.push({...item, cartId: Date.now()});
            document.getElementById('count').innerText = cart.length;
        }

        function viewCart() {
            if(cart.length === 0) return alert("Cart is empty!");
            showSec('cart-section');
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map(i => {
                total += i.price;
                return `<div class="cart-row">
                    <span>${i.name}</span>
                    <span>Rs. ${i.price} <button class="btn" style="border-color:red; color:red; padding:2px 8px; margin-left:10px" onclick="removeItem(${i.cartId})">X</button></span>
                </div>`;
            }).join('');
            document.getElementById('total-val').innerText = total;
        }

        function removeItem(cid) {
            cart = cart.filter(i => i.cartId !== cid);
            document.getElementById('count').innerText = cart.length;
            if(cart.length === 0) backToMenu(); else viewCart();
        }

        function checkout() {
            const total = cart.reduce((s, i) => s + i.price, 0);
            const time = new Date().toLocaleString();
            const order = cart.map(i => i.name).join(", ");
            
            history.push({time, order, total});
            localStorage.setItem('skr_history', JSON.stringify(history));

            showSec('bill-section');
            document.getElementById('bill-date').innerText = time;
            document.getElementById('bill-items').innerHTML = cart.map(i => 
                `<div class="receipt-item"><span>${i.name}</span><span>${i.price}</span></div>`).join('');
            document.getElementById('bill-total').innerText = total;
            cart = [];
            document.getElementById('count').innerText = 0;
        }

        function newOrder() {
            // Persistent Session: Ab login nahi mangega
            showSec('menu-section');
        }

        function viewHistory() {
            showSec('history-section');
            const body = document.getElementById('hist-body');
            let grand = 0;
            body.innerHTML = history.map(h => {
                grand += h.total;
                return `<tr><td>${h.time}</td><td>${h.order}</td><td>${h.total}</td></tr>`;
            }).join('');
            document.getElementById('grand-total').innerText = grand;
        }

        function clearHistory() { if(confirm("Clear all data?")) { history = []; localStorage.clear(); viewHistory(); } }
        function backToMenu() { showSec('menu-section'); }
        function showSec(id) {
            ['login-section', 'menu-section', 'cart-section', 'bill-section', 'history-section'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
