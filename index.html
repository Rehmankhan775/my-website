<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKR | Sher Alam Khan Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
--gold:#d4af37;
--dark:#0b0b0b;
--gray:#1a1a1a;
--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:white}
.hidden{display:none!important}
.container{max-width:1200px;margin:auto;padding:20px}

.btn{
padding:8px 16px;
border:1px solid var(--gold);
background:transparent;
color:var(--gold);
cursor:pointer;
border-radius:4px;
}
.btn:hover{background:var(--gold);color:black}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}
.item-card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
}
.item-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}
.search-box input{
width:100%;
padding:10px;
margin:20px 0;
background:#000;
color:#fff;
border:1px solid var(--gold);
}
</style>
</head>

<body>

<!-- LOGIN -->
<section id="login-sec">
<div style="text-align:center;margin-top:150px;">
<h1 style="color:var(--gold);font-size:3rem;">SKR</h1>
<input type="password" id="pass" placeholder="Password (1234)" style="padding:10px;margin:20px 0;">
<br>
<button class="btn" onclick="login()">Login</button>
</div>
</section>

<!-- MAIN -->
<section id="main-sec" class="hidden">
<div class="container">
<h1 style="color:var(--gold);text-align:center;">Sher Alam Khan Restaurant</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search dish..." onkeyup="searchMenu()">
</div>

<button class="btn" onclick="showCart()">Cart (<span id="count">0</span>)</button>
<button class="btn" onclick="showHistory()">History</button>

<div id="menu-container"></div>
</div>
</section>

<!-- CART -->
<section id="cart-sec" class="hidden">
<div class="container">
<button class="btn" onclick="goBack()">Back</button>
<h2 style="margin-top:20px;">Your Order</h2>

<label>Persons (100 per person): </label>
<input type="number" id="personCount" value="0" onchange="calculateTotal()">

<div id="cart-list"></div>
<h2>Total: Rs. <span id="total-val">0</span></h2>
<button class="btn" onclick="confirmOrder()">Confirm</button>
</div>
</section>

<!-- HISTORY -->
<section id="hist-sec" class="hidden">
<div class="container">
<button class="btn" onclick="goBack()">Back</button>
<h2>Sales History</h2>
<div id="hist-body"></div>
<h3>Grand Total: Rs. <span id="grand-total">0</span></h3>
</div>
</section>

<script>

/* ================= 42 ITEMS ================= */

{ id:39,name:"Karak Chai",price:50,img:"https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?w=400"},
{ id:40,name:"Doodh Patti",price:60,img:"https://images.unsplash.com/photo-1576092729250-59c2401831cf?w=400"},
{ id:41,name:"Green Tea",price:40,img:"https://images.unsplash.com/photo-1564890369478-c89ca6d9cde9?w=400"},
{ id:42,name:"Drinks / Water",price:60,img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400"}
];

let cart=[];
let sales=JSON.parse(localStorage.getItem("skr_sales"))||[];

function login(){
if(document.getElementById("pass").value==="1234"){
toggle("main-sec");
renderItems(menu);
}else{alert("Wrong Password")}
}

function renderItems(data){
document.getElementById("menu-container").innerHTML=
`<div class="menu-grid">
${data.map(i=>`
<div class="item-card">
<img src="${i.img}">
<h3>${i.name}</h3>
<p style="color:var(--gold)">Rs. ${i.price}</p>
<button class="btn" onclick="addToCart(${i.id})">Add</button>
</div>`).join("")}
</div>`;
}

function searchMenu(){
let val=document.getElementById("searchInput").value.toLowerCase();
renderItems(menu.filter(i=>i.name.toLowerCase().includes(val)));
}

function addToCart(id){
let item=menu.find(i=>i.id===id);
cart.push(item);
document.getElementById("count").innerText=cart.length;
}

function showCart(){
if(!cart.length){alert("Cart empty");return;}
toggle("cart-sec");
document.getElementById("cart-list").innerHTML=
cart.map(i=>`<div style="display:flex;justify-content:space-between;margin:10px 0;">
<span>${i.name}</span><span>${i.price}</span></div>`).join("");
calculateTotal();
}

function calculateTotal(){
let total=cart.reduce((a,b)=>a+b.price,0);
let persons=parseInt(document.getElementById("personCount").value)||0;
total+=persons*100;
document.getElementById("total-val").innerText=total;
return total;
}

function confirmOrder(){
let total=calculateTotal();
sales.push({time:new Date().toLocaleString(),total});
localStorage.setItem("skr_sales",JSON.stringify(sales));
alert("Order Confirmed!");
cart=[];document.getElementById("count").innerText=0;
goBack();
}

function showHistory(){
toggle("hist-sec");
document.getElementById("hist-body").innerHTML=
sales.map(s=>`<div>${s.time} - Rs.${s.total}</div>`).join("");
document.getElementById("grand-total").innerText=
sales.reduce((a,b)=>a+b.total,0);
}

function toggle(id){
["login-sec","main-sec","cart-sec","hist-sec"].forEach(s=>{
document.getElementById(s).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function goBack(){toggle("main-sec");}

</script>

</body>
</html>
