<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR | Sher Alam Khan Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0b0b0b;
            --gray: #1a1a1a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: var(--white);
        }

        .hidden {
            display: none !important;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.9)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200');
            background-size: cover;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .btn {
            padding: 8px 18px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
        }

        .btn-red {
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .btn-red:hover {
            background: #ff4d4d;
            color: white;
        }

        .branding-center {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 20px;
        }

        .branding-center h1 {
            font-family: 'Playfair Display';
            color: var(--gold);
            font-size: 3.5rem;
            letter-spacing: 5px;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px;
            border-radius: 25px;
            border: 1px solid var(--gold);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 15px;
            color: var(--gold);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-card {
            background: rgba(25, 25, 25, 0.95);
            border-radius: 12px;
            border: 1px solid #333;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
            padding-bottom: 15px;
        }

        .item-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .variant-btns {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 0 10px;
        }

        .v-btn {
            flex: 1;
            padding: 5px;
            font-size: 0.75rem;
            border: 1px solid var(--gold);
            background: transparent;
            color: white;
            cursor: pointer;
            border-radius: 3px;
        }

        .v-btn:hover {
            background: var(--gold);
            color: black;
        }

        #receipt {
            background: #fff;
            color: #000;
            padding: 30px;
            max-width: 400px;
            margin: 20px auto;
            font-family: monospace;
            border: 1px solid #000;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            margin-top: 20px;
        }

        .history-table th,
        .history-table td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>

<body>

    <section id="login-sec">
        <div style="text-align:center; margin-top:100px;">
            <div
                style="background:rgba(20,20,20,0.95); padding:40px; border-radius:15px; border:1px solid var(--gold); display:inline-block; width:350px;">
                <h1 style="color:var(--gold); font-family:'Playfair Display'; font-size:3rem;">SKR</h1>
                <input type="password" id="pass" placeholder="Enter Password (1234)"
                    style="width:100%; padding:10px; margin:20px 0; background:#000; color:#fff; border:1px solid #444;">
                <button class="btn" style="width:100%" onclick="login()">Login</button>
            </div>
        </div>
    </section>

    <section id="main-sec" class="hidden">
        <div class="container">
            <div class="branding-center">
                <h1>SKR</h1>
                <p style="color:#aaa; letter-spacing:2px;">SHER ALAM KHAN RESTAURANT</p>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput"
                        placeholder="Search dish..." onkeyup="searchMenu()"></div>
                <button class="btn" onclick="showHistory()">History</button>
                <button class="btn" onclick="showCart()">Cart (<span id="count">0</span>)</button>
            </div>
            <div id="menu-container"></div>
        </div>
    </section>

    <section id="cart-sec" class="hidden">
        <div class="container">
            <button class="btn" onclick="goBack()">← Back</button>
            <div
                style="background:var(--gray); padding:25px; margin-top:20px; border-radius:10px; border:1px solid var(--gold)">
                <h2 style="color:var(--gold); margin-bottom:15px;">Review Order</h2>
                <div style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <label>No. of Persons (Rs. 100/person extra): </label>
                    <input type="number" id="personCount" value="0" min="0" onchange="calculateTotal()"
                        style="background:#000; color:gold; border:1px solid gold; width:60px; text-align:center;">
                </div>
                <div id="cart-list"></div>
                <div style="text-align:right; margin-top:20px;">
                    <h3>Service Charges: Rs. <span id="service-charges">0</span></h3>
                    <h2 style="font-size:2.5rem; color:var(--gold)">Total: Rs. <span id="total-val">0</span></h2>
                    <button class="btn" style="background:var(--gold); color:#000; padding:15px 30px"
                        onclick="confirmOrder()">Confirm Order</button>
                </div>
            </div>
        </div>
    </section>

    <section id="bill-sec" class="hidden">
        <div class="container">
            <div id="receipt">
                <center>
                    <h2>SKR RESTAURANT</h2>
                    <p id="bill-time"></p>
                </center>
                <div id="bill-items" style="margin-top:20px"></div>
                <div id="bill-service"
                    style="display:flex; justify-content:space-between; margin-top:10px; font-style:italic; border-top:1px dashed #000; padding-top:5px;">
                </div>
                <div style="border-top:2px solid #000; margin-top:10px; padding-top:10px">
                    <h3 style="display:flex; justify-content:space-between">GRAND TOTAL: <span>Rs. <span
                                id="final-amt"></span></span></h3>
                </div>
                <center style="margin-top:30px"><button class="btn" onclick="window.print()"
                        style="color:black; border-color:black;">Print</button> <button class="btn" onclick="newOrder()"
                        style="color:black; border-color:black;">New Order</button></center>
            </div>
        </div>
    </section>

    <section id="hist-sec" class="hidden">
        <div class="container">
            <button class="btn" onclick="goBack()">← Back</button>
            <button class="btn btn-red" onclick="resetHistory()" style="float:right">Reset History</button>
            <div style="background:#1a1a1a; padding:20px; margin-top:60px; border-radius:10px;">
                <h2 style="color:var(--gold)">Sales History</h2>
                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Items</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="hist-body"></tbody>
                </table>
                <h2 style="text-align:right; margin-top:20px; color:var(--gold)">Grand Total: Rs. <span
                        id="grand-total-val">0</span></h2>
            </div>
        </div>
    </section>

    <script>
        // MUKAMMAL 42 ITEMS WITH UPDATED PICS
        const menu = [
            { id: 1, name: "Chicken Karahi", hasVariants: true, prices: { full: 1600, half: 850 }, img: "https://images.unsplash.com/photo-1603496987351-f84a3ba5ec85?w=400" },
            { id: 2, name: "Chicken Shinwari Karahi", hasVariants: true, prices: { full: 1600, half: 850 }, img: "https://images.unsplash.com/photo-1626776876729-babd0f23583a?w=400" },
            { id: 3, name: "Chicken Namkeen Karahi", hasVariants: true, prices: { full: 1600, half: 850 }, img: "https://images.unsplash.com/photo-1545231027-63b3f162ad70?w=400" },
            { id: 4, name: "Chicken Special Karahi", hasVariants: true, prices: { full: 2200, half: 1150 }, img: "https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=400" },
            { id: 5, name: "Chicken White Karahi", hasVariants: true, prices: { full: 2000, half: 1050 }, img: "https://images.unsplash.com/photo-1567815350444-c9239babc886?w=400" },
            { id: 6, name: "Chicken Green Karahi", hasVariants: true, prices: { full: 2000, half: 1050 }, img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" },
            { id: 7, name: "Mutton Karahi", hasVariants: true, prices: { full: 2800, half: 1450 }, img: "https://carameltintedlife.com/wp-content/uploads/2021/09/karahi-gosht-1-3-1.jpg" },
            { id: 8, name: "Mutton Shinwari Karahi", hasVariants: true, prices: { full: 2800, half: 1450 }, img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400" },
            { id: 9, name: "Mutton White Karahi", hasVariants: true, prices: { full: 3000, half: 1550 }, img: "https://images.unsplash.com/photo-1588166524941-3bf61a9c41db?w=400" },
            { id: 10, name: "Mutton Boneless Karahi", hasVariants: true, prices: { full: 3200, half: 1650 }, img: "https://images.unsplash.com/photo-1603360946369-dc9bb6258143?w=400" },
            { id: 11, name: "Mutton Namkeen Karahi", hasVariants: true, prices: { full: 2800, half: 1450 }, img: "https://images.unsplash.com/photo-1628294895912-73041ab33efb?w=400" },
            { id: 12, name: "Beef Pulao", price: 800, img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400" },
            { id: 13, name: "Mutton Namkeen Rice", price: 2800, img: "https://images.unsplash.com/photo-1512132411229-c30391241dd8?w=400" },
            { id: 14, name: "Chicken Sada Rice", price: 450, img: "https://images.unsplash.com/photo-1516684732162-798a0062be99?w=400" },
            { id: 15, name: "Chicken Fried Rice", price: 1200, img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400" },
            { id: 16, name: "Mutton Roast (Full)", price: 2600, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400" },
            { id: 17, name: "Mutton Tikka (1kg)", price: 2600, img: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400" },
            { id: 18, name: "Mutton Masala", price: 2800, img: "https://images.unsplash.com/photo-1596797038558-b038b556942b?w=400" },
            { id: 19, name: "Mutton Handi", price: 3200, img: "https://images.unsplash.com/photo-1635443197314-b6320579e05e?w=400" },
            { id: 20, name: "Steam Ran (1kg)", price: 2800, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400" },
            { id: 21, name: "Sabat Dunba (1kg)", price: 2800, img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400" },
            { id: 22, name: "Chicken Broast", price: 500, img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=400" },
            { id: 23, name: "Chicken Tikka Boti", price: 300, img: "https://images.unsplash.com/photo-1621460244694-032087397772?w=400" },
            { id: 24, name: "Chicken Malai Boti", price: 300, img: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400" },
            { id: 25, name: "Chicken Achari Boti", price: 300, img: "https://images.unsplash.com/photo-1601356616077-6957284f7091?w=400" },
            { id: 26, name: "Dam Pookh", price: 1000, img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=400" },
            { id: 27, name: "Chicken Kabab", price: 150, img: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400" },
            { id: 28, name: "Reshmi Kabab", price: 150, img: "https://images.unsplash.com/photo-1601356616077-6957284f7091?w=400" },
            { id: 29, name: "Grill Fish", price: 1200, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=400" },
            { id: 30, name: "Fry Fish", price: 1000, img: "https://images.unsplash.com/photo-1593030761757-71fae45fa0e7?w=400" },
            { id: 31, name: "Finger Fish", price: 1000, img: "https://images.unsplash.com/photo-1574484284002-952d92456975?w=400" },
            { id: 32, name: "Daal Mash", price: 200, img: "https://fatimacooks.net/wp-content/uploads/2015/07/Mash-ki-Daal-recipe-2.jpg" },
            { id: 33, name: "Mixed Sabzi", price: 200, img: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400" },
            { id: 34, name: "Raita (Fresh)", price: 50, img: "https://images.unsplash.com/photo-1610192244261-3f33de3f55e4?w=400" },
            { id: 35, name: "Paratha", price: 50, img: "https://images.unsplash.com/photo-1610192244261-3f33de3f55e4?w=400" },
            { id: 36, name: "Chicken Corn Soup", price: 250, img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400" },
            { id: 37, name: "Chicken Hot & Sour", price: 250, img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400" },
            { id: 38, name: "SK Sohan Halwa", price: 800, img: "https://images.unsplash.com/photo-1589119908995-c6837fa14848?w=400" },
            { id: 39, name: "Karak Chai", price: 50, img: "https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?w=400" },
            { id: 40, name: "Doodh Patti", price: 60, img: "https://images.unsplash.com/photo-1576092729250-59c2401831cf?w=400" },
            { id: 41, name: "Green Tea", price: 40, img: "https://images.unsplash.com/photo-1564890369478-c89ca6d9cde9?w=400" },
            { id: 42, name: "Drinks / Water", price: 60, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
        ];

        let cart = [];
        let sales = JSON.parse(localStorage.getItem('skr_sales')) || [];

        function login() {
            if (document.getElementById('pass').value === '1234') {
                sessionStorage.setItem('skr_auth', 't');
                showMain();
            }
            else {
                alert("Wrong Password!");
            }
        }
        window.onload = () => { if (sessionStorage.getItem('skr_auth')) showMain(); };

        function showMain() { toggle('main-sec'); renderItems(menu); }

        function renderItems(data) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<div class="menu-grid">${data.map(i => `
                <div class="item-card">
                    <img src="${i.img}">
                    <h3>${i.name}</h3>
                    ${i.hasVariants ? `
                        <div class="variant-btns">
                            <button class="v-btn" onclick="addToCart(${i.id}, 'Full')">Full - ${i.prices.full}</button>
                            <button class="v-btn" onclick="addToCart(${i.id}, 'Half')">Half - ${i.prices.half}</button>
                        </div>
                    ` : `
                        <p style="color:var(--gold); font-weight:bold; margin-bottom:10px;">Rs. ${i.price}</p>
                        <button class="btn" onclick="addToCart(${i.id})">Add Item</button>
                    `}
                </div>
            ).join('')}</div>;
        }

        function searchMenu() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderItems(menu.filter(i => i.name.toLowerCase().includes(val)));
        }

        function addToCart(id, variant = null) {
            const item = menu.find(i => i.id === id);
            let p = variant ? item.prices[variant.toLowerCase()] : item.price;
            let n = variant ? ${item.name} (${variant}) : item.name;
            cart.push({ name: n, price: p, uid: Date.now() });
            document.getElementById('count').innerText = cart.length;
        }

        function calculateTotal() {
            const itemsTotal = cart.reduce((a,b) => a + b.price, 0);
            const persons = parseInt(document.getElementById('personCount').value) || 0;
            const service = persons * 100;
            const grand = itemsTotal + service;
            document.getElementById('service-charges').innerText = service;
            document.getElementById('total-val').innerText = grand;
            return { grand, service, persons };
        }

        function showCart() {
            if(!cart.length) return alert("Cart empty!");
            toggle('cart-sec');
            document.getElementById('cart-list').innerHTML = cart.map(i => `
                < div style = "display:flex; justify-content:space-between; margin-bottom:10px;" >
                    <span>${i.name}</span>
                    <span>Rs. ${i.price} <i class="fas fa-trash" onclick="remove(${i.uid})" style="color:red; cursor:pointer; margin-left:10px;"></i></span>
                </div >
                `).join('');
            calculateTotal();
        }

        function remove(uid) {
            cart = cart.filter(i => i.uid !== uid);
            document.getElementById('count').innerText = cart.length;
            cart.length ? showCart() : goBack();
        }

        function confirmOrder() {
            const data = calculateTotal();
            const time = new Date().toLocaleString();
            const itemNames = cart.map(i => i.name).join(", ");
            
            if(itemNames) {
                sales.push({ time, items: itemNames, total: data.grand });
                localStorage.setItem('skr_sales', JSON.stringify(sales));
            }

            toggle('bill-sec');
            document.getElementById('bill-time').innerText = time;
            document.getElementById('bill-items').innerHTML = cart.map(i=><div style="display:flex; justify-content:space-between"><span>${i.name}</span><span>${i.price}</span></div>).join('');
            document.getElementById('bill-service').innerHTML = <span>Service Charges (${data.persons} Persons)</span><span>${data.service}</span>;
            document.getElementById('final-amt').innerText = data.grand;
            cart = []; document.getElementById('count').innerText = 0;
            document.getElementById('personCount').value = 0;
        }

        function showHistory() {
            toggle('hist-sec');
            const body = document.getElementById('hist-body');
            body.innerHTML = sales.filter(s => s.items).map(s => <tr><td>${s.time}</td><td>${s.items}</td><td>${s.total}</td></tr>).join('');
            document.getElementById('grand-total-val').innerText = sales.reduce((a,b) => a + (b.total || 0), 0);
        }

        function resetHistory() {
            if(confirm("Are you sure you want to clear all history?")) {
                sales = []; localStorage.removeItem('skr_sales'); showHistory();
            }
        }

        function goBack() { toggle('main-sec'); }
        function newOrder() { toggle('main-sec'); }
        function toggle(id) {
            ['login-sec','main-sec','cart-sec','bill-sec','hist-sec'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>

</html>
