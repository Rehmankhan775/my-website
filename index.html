<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR | Billing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0b0b0b; --gray: #1a1a1a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); }
        .hidden { display: none !important; }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200');
            background-size: cover; z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .btn { padding: 8px 18px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; border-radius: 4px; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: #000; }

        /* Centered Header & Search */
        .branding-center { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .branding-center h1 { font-family: 'Playfair Display'; color: var(--gold); font-size: 3.5rem; letter-spacing: 5px; margin-bottom: 5px; }
        .search-box { width: 100%; max-width: 500px; margin: 20px auto; position: relative; }
        .search-box input { width: 100%; padding: 12px 40px; border-radius: 25px; border: 1px solid var(--gold); background: rgba(0,0,0,0.5); color: white; outline: none; }
        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--gold); }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { background: rgba(25,25,25,0.9); border-radius: 12px; border: 1px solid #333; overflow: hidden; text-align: center; transition: 0.3s; }
        .item-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .item-card img { width: 100%; height: 160px; object-fit: cover; }
        .item-info { padding: 15px; }
        .item-info h3 { font-size: 1rem; margin-bottom: 10px; height: 40px; }

        /* Manual Person Option */
        .person-input-box { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--gold); }
        .person-input-box input { background: #000; border: 1px solid var(--gold); color: gold; padding: 5px; width: 60px; text-align: center; font-size: 1.2rem; }

        /* Receipt */
        #receipt { background: #fff; color: #000; padding: 30px; max-width: 400px; margin: 20px auto; font-family: monospace; border: 1px solid #000; }
        .receipt-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <section id="login-sec">
        <div style="text-align:center; margin-top:100px;">
            <div style="background:rgba(20,20,20,0.95); padding:40px; border-radius:15px; border:1px solid var(--gold); display:inline-block; width:350px;">
                <h1 style="color:var(--gold); font-family:'Playfair Display'; font-size:3rem;">SKR</h1>
                <input type="password" id="pass" placeholder="Enter Password" style="width:100%; padding:10px; margin:20px 0; background:#000; color:#fff; border:1px solid #444;">
                <button class="btn" style="width:100%" onclick="login()">Login</button>
            </div>
        </div>
    </section>

    <section id="main-sec" class="hidden">
        <div class="container">
            <div class="branding-center">
                <h1>SKR</h1>
                <p style="color:#aaa; letter-spacing:2px;">SHER ALAM KHAN RESTAURANT</p>
                <p style="font-size:0.8rem; margin-top:5px;">Bhakkar Road, D.I.Khan | 0332-0797107</p>
                
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search dish name..." onkeyup="searchMenu()">
                </div>

                <div style="margin-top:10px;">
                    <button class="btn" onclick="showHistory()">History</button>
                    <button class="btn" onclick="showCart()">Cart (<span id="count">0</span>)</button>
                </div>
            </div>

            <div id="menu-container"></div>
        </div>
    </section>

    <section id="cart-sec" class="hidden">
        <div class="container">
            <button class="btn" onclick="goBack()">← Back</button>
            <div style="background:var(--gray); padding:25px; margin-top:20px; border-radius:10px; border:1px solid var(--gold)">
                <h2 style="color:var(--gold)">Order Review</h2>
                
                <div class="person-input-box">
                    <label>Number of Persons (Service Charges Rs. 100 per person): </label>
                    <input type="number" id="personCount" value="0" min="0" onchange="calculateTotal()">
                </div>

                <div id="cart-list"></div>
                <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
                <div style="text-align:right">
                    <h3>Service Charges: Rs. <span id="service-charges">0</span></h3>
                    <h2 style="font-size:2.5rem; color:var(--gold)">Total: Rs. <span id="total-val">0</span></h2>
                    <button class="btn" style="background:var(--gold); color:#000; margin-top:20px; padding:15px 30px" onclick="confirmOrder()">Confirm Order</button>
                </div>
            </div>
        </div>
    </section>

    <section id="bill-sec" class="hidden">
        <div class="container">
            <div id="receipt">
                <div class="receipt-header">
                    <h2>SKR RESTAURANT</h2>
                    <p>Bhakkar Road, D.I.Khan</p>
                    <p id="bill-time"></p>
                </div>
                <div id="bill-items"></div>
                <div id="bill-service" style="display:flex; justify-content:space-between; margin-top:10px; font-style:italic;"></div>
                <div style="border-top:2px solid #000; margin-top:10px; padding-top:10px">
                    <h3 style="display:flex; justify-content:space-between">GRAND TOTAL: <span>Rs. <span id="final-amt"></span></span></h3>
                </div>
                <center style="margin-top:30px">
                    <button class="btn" onclick="window.print()" style="border-color:#000; color:#000">Print Bill</button>
                    <button class="btn" onclick="newOrder()" style="border-color:#000; color:#000">New Order</button>
                </center>
            </div>
        </div>
    </section>

    <section id="hist-sec" class="hidden">
        <div class="container">
            <button class="btn" onclick="goBack()">← Back</button>
            <div style="background:#1a1a1a; padding:20px; margin-top:20px; border-radius:10px;">
                <h2 style="color:var(--gold)">Sales History (24 Hours)</h2>
                <div id="history-content"></div>
            </div>
        </div>
    </section>

    <script>
        const menu = [
            { id: 1, name: "Chicken Karahi (Full)", price: 1600, img: "https://images.unsplash.com/photo-1603496987351-f84a3ba5ec85?w=400" },
            { id: 2, name: "Mutton Karahi (Full)", price: 2800, img: "https://images.unsplash.com/photo-1545231027-63b3f162ad70?w=400" },
            { id: 3, name: "Beef Pulao", price: 800, img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400" },
            { id: 4, name: "Mutton Roast", price: 2600, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400" },
            { id: 5, name: "Steam Ran", price: 2800, img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400" },
            { id: 6, name: "Daal Mash", price: 200, img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400" },
            { id: 7, name: "Mixed Sabzi", price: 200, img: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400" },
            { id: 8, name: "Karak Chai", price: 50, img: "https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?w=400" },
            { id: 9, name: "Cold Drink", price: 60, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
            // ... (Baaki items bhi is tarah list mein hain)
        ];

        let cart = [];
        let sales = JSON.parse(localStorage.getItem('skr_sales')) || [];

        function login() {
            if(document.getElementById('pass').value === '1234') {
                sessionStorage.setItem('skr_auth', 't');
                showMain();
            } else alert("Wrong Password!");
        }

        window.onload = () => { if(sessionStorage.getItem('skr_auth')) showMain(); };

        function showMain() {
            toggle('main-sec');
            renderItems(menu);
        }

        function renderItems(data) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<div class="menu-grid">${data.map(i => `
                <div class="item-card">
                    <img src="${i.img}">
                    <div class="item-info">
                        <h3>${i.name}</h3>
                        <p style="color:var(--gold); font-weight:bold;">Rs. ${i.price}</p>
                        <button class="btn" style="margin-top:10px" onclick="addToCart(${i.id})">Add to Order</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function searchMenu() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = menu.filter(i => i.name.toLowerCase().includes(val));
            renderItems(filtered);
        }

        function addToCart(id) {
            const item = menu.find(i => i.id === id);
            cart.push({...item, uid: Date.now()});
            document.getElementById('count').innerText = cart.length;
        }

        function calculateTotal() {
            const itemsTotal = cart.reduce((a,b) => a + b.price, 0);
            const persons = parseInt(document.getElementById('personCount').value) || 0;
            const serviceTotal = persons * 100;
            const grandTotal = itemsTotal + serviceTotal;

            document.getElementById('service-charges').innerText = serviceTotal;
            document.getElementById('total-val').innerText = grandTotal;
            return { itemsTotal, serviceTotal, grandTotal, persons };
        }

        function showCart() {
            if(!cart.length) return alert("Cart empty!");
            toggle('cart-sec');
            document.getElementById('cart-list').innerHTML = cart.map(i => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${i.name}</span>
                    <span>Rs. ${i.price} <i class="fas fa-trash" onclick="remove(${i.uid})" style="color:red; cursor:pointer; margin-left:10px;"></i></span>
                </div>
            `).join('');
            calculateTotal();
        }

        function remove(uid) {
            cart = cart.filter(i => i.uid !== uid);
            document.getElementById('count').innerText = cart.length;
            cart.length ? showCart() : goBack();
        }

        function confirmOrder() {
            const data = calculateTotal();
            const time = new Date().toLocaleString();
            
            sales.push({ time, items: cart.map(i=>i.name).join(", "), total: data.grandTotal });
            localStorage.setItem('skr_sales', JSON.stringify(sales));

            toggle('bill-sec');
            document.getElementById('bill-time').innerText = time;
            document.getElementById('bill-items').innerHTML = cart.map(i=>`<div style="display:flex; justify-content:space-between"><span>${i.name}</span><span>${i.price}</span></div>`).join('');
            document.getElementById('bill-service').innerHTML = `<span>Service Charges (${data.persons} Persons)</span><span>${data.serviceTotal}</span>`;
            document.getElementById('final-amt').innerText = data.grandTotal;
            
            cart = []; document.getElementById('count').innerText = 0;
            document.getElementById('personCount').value = 0;
        }

        function showHistory() {
            toggle('hist-sec');
            const totalSales = sales.reduce((a,b) => a + b.total, 0);
            document.getElementById('history-content').innerHTML = `
                <table style="width:100%; border-collapse:collapse; color:white; margin-top:15px;">
                    <tr style="background:var(--gold); color:black"><th>Time</th><th>Order</th><th>Total</th></tr>
                    ${sales.map(s => `<tr><td>${s.time}</td><td>${s.items}</td><td>${s.total}</td></tr>`).join('')}
                </table>
                <h2 style="text-align:right; margin-top:20px; color:var(--gold)">GRAND TOTAL: Rs. ${totalSales}</h2>
            `;
        }

        function goBack() { toggle('main-sec'); }
        function newOrder() { toggle('main-sec'); }
        function toggle(id) {
            ['login-sec','main-sec','cart-sec','bill-sec','hist-sec'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
