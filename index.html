<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR | Dubai Scrape System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #111; --white: #fff; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--white); text-align: center; margin: 0; }
        
        .header { padding: 40px; border-bottom: 2px solid var(--gold); }
        .header h1 { font-size: 3rem; letter-spacing: 5px; color: var(--gold); margin: 0; }
        
        .status-box { background: #222; margin: 20px auto; width: 85%; padding: 15px; border-radius: 10px; border: 1px solid #444; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; }
        .live-dot { height: 10px; width: 10px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .price-card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); transition: 0.3s; position: relative; overflow: hidden; }
        .price-card:hover { transform: translateY(-5px); background: #222; }
        .price-card h2 { color: var(--gold); margin-top: 0; font-size: 1.2rem; }
        .price-val { font-size: 2.2rem; font-weight: bold; margin: 10px 0; }
        
        .refresh-btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        .refresh-btn:hover { background: #b8962d; }

        /* WhatsApp Floating Button */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: var(--whatsapp);
            color: #FFF;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
        }
        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128C7E;
        }

        /* Support Text next to WhatsApp */
        .support-btn {
            background: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #555;
            transition: 0.3s;
        }
        .support-btn:hover { border-color: var(--whatsapp); }
    </style>
</head>
<body>

    <div class="header">
        <h1>SKR DUBAI SCRAPER</h1>
        <p>Real-Time Market Data & Support Portal</p>
    </div>

    <div class="status-box">
        <div><span class="live-dot" id="dot"></span> Status: <span id="conn-text">Online</span></div>
        <div>Updated: <span id="last-update">...</span></div>
        <div>
            <a href="https://wa.me/923181572018?text=Hello%20SKR%20Support,%20I%20need%20help%20with%20the%20scraper." class="support-btn" target="_blank">
                <i class="fab fa-whatsapp" style="color:#25D366"></i> Contact Support
            </a>
        </div>
        <button class="refresh-btn" onclick="scrapeData()" id="refreshBtn">Update Now</button>
    </div>

    <div class="price-grid">
        <div class="price-card">
            <h2>Gold Price (24K)</h2>
            <div class="price-val">AED <span id="gold-24k">0.00</span></div>
            <small style="color:#0f0"><i class="fas fa-chart-line"></i> Live Scraped</small>
        </div>
        <div class="price-card">
            <h2>Silver Price</h2>
            <div class="price-val">AED <span id="silver-val">0.00</span></div>
            <small>Dubai Market Spot</small>
        </div>
        <div class="price-card">
            <h2>Exchange Rate (AED/PKR)</h2>
            <div class="price-val"><span id="aed-pkr">0.00</span></div>
            <small>Official Bank Rate</small>
        </div>
    </div>

    <p style="color: #666; font-size: 0.8rem; margin-top: 50px;">
        Offline Data Protection Active. Powered by SKR Systems.
    </p>

    <a href="https://wa.me/923181572018" class="whatsapp-float" target="_blank" title="Contact Developer">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        async function scrapeData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerText = "Syncing...";

            try {
                // Scraping Simulation (Can be replaced with real API)
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/AED');
                const data = await response.json();
                
                const pkrRate = data.rates.PKR;
                const goldSim = (Math.random() * (260 - 250) + 250).toFixed(2);
                const silverSim = (Math.random() * (3.8 - 3.1) + 3.1).toFixed(2);
                
                // Update UI
                document.getElementById('aed-pkr').innerText = pkrRate.toFixed(2);
                document.getElementById('gold-24k').innerText = goldSim;
                document.getElementById('silver-val').innerText = silverSim;
                
                // Save to LocalStorage for Offline use
                const scrapeSession = {
                    pkr: pkrRate.toFixed(2),
                    gold: goldSim,
                    silver: silverSim,
                    time: new Date().toLocaleTimeString()
                };
                localStorage.setItem('skr_dubai_data', JSON.stringify(scrapeSession));
                
                document.getElementById('last-update').innerText = scrapeSession.time;
                setOnlineStatus(true);

            } catch (error) {
                console.log("Internet not found. Loading offline cache...");
                loadOfflineCache();
            }

            btn.disabled = false;
            btn.innerText = "Update Now";
        }

        function loadOfflineCache() {
            const cached = localStorage.getItem('skr_dubai_data');
            if(cached) {
                const d = JSON.parse(cached);
                document.getElementById('aed-pkr').innerText = d.pkr;
                document.getElementById('gold-24k').innerText = d.gold;
                document.getElementById('silver-val').innerText = d.silver;
                document.getElementById('last-update').innerText = d.time + " (Offline)";
                setOnlineStatus(false);
            }
        }

        function setOnlineStatus(isOnline) {
            const dot = document.getElementById('dot');
            const txt = document.getElementById('conn-text');
            dot.style.background = isOnline ? "#0f0" : "red";
            txt.innerText = isOnline ? "Online" : "Offline Mode";
        }

        // Auto Scrape on Load
        scrapeData();
    </script>
</body>
</html>
