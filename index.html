<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR | Sher Alam Khan Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root{ --gold:#d4af37; --dark:#0b0b0b; --gray:#1a1a1a; --white:#fff; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:var(--dark);color:white}
        .hidden{display:none!important}
        .container{max-width:1200px;margin:auto;padding:20px}
        .btn{ padding:8px 12px; border:1px solid var(--gold); background:transparent; color:var(--gold); cursor:pointer; border-radius:4px; margin:2px; font-size: 0.8rem; }
        .btn:hover{background:var(--gold);color:black}
        .menu-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-top:20px; }
        .item-card{ background:#1a1a1a; padding:15px; border-radius:10px; text-align:center; border: 1px solid #333; }
        .item-card img{ width:100%; height:160px; object-fit:cover; border-radius:8px; }
        .search-box input{ width:100%; padding:12px; margin:20px 0; background:#000; color:#fff; border:1px solid var(--gold); border-radius: 5px; }
        .portion-box { margin-top: 10px; display: flex; justify-content: center; gap: 5px; }
        .price-tag { color: var(--gold); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<section id="login-sec">
    <div style="text-align:center;margin-top:150px;">
        <h1 style="color:var(--gold);font-size:3rem;">SKR</h1>
        <input type="password" id="pass" placeholder="Password (1234)" style="padding:10px;margin:20px 0;">
        <br>
        <button class="btn" style="padding: 10px 30px;" onclick="login()">Login</button>
    </div>
</section>

<section id="main-sec" class="hidden">
    <div class="container">
        <h1 style="color:var(--gold);text-align:center;">Sher Alam Khan Restaurant</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search dish..." onkeyup="searchMenu()">
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <button class="btn" onclick="showCart()"><i class="fas fa-shopping-cart"></i> Cart (<span id="count">0</span>)</button>
            <button class="btn" onclick="showHistory()">Sales History</button>
        </div>
        <div id="menu-container"></div>
    </div>
</section>

<section id="cart-sec" class="hidden">
    <div class="container">
        <button class="btn" onclick="goBack()">← Back</button>
        <h2 style="margin:20px 0; border-bottom: 1px solid var(--gold); padding-bottom: 10px;">Your Order</h2>
        <div style="margin-bottom: 20px; background: #222; padding: 15px; border-radius: 8px;">
            <label>Persons (Serving Charges Rs. 100/head): </label>
            <input type="number" id="personCount" value="0" min="0" onchange="calculateTotal()" style="padding: 5px; width: 60px;">
        </div>
        <div id="cart-list" style="margin-bottom: 20px;"></div>
        <h2 style="text-align: right;">Total: Rs. <span id="total-val">0</span></h2>
        <button class="btn" style="width: 100%; padding: 15px; margin-top: 20px; font-weight: bold;" onclick="confirmOrder()">CONFIRM ORDER</button>
    </div>
</section>

<section id="hist-sec" class="hidden">
    <div class="container">
        <button class="btn" onclick="goBack()">← Back</button>
        <h2 style="margin: 20px 0;">Sales History</h2>
        <div id="hist-body" style="background: #1a1a1a; padding: 15px; border-radius: 10px;"></div>
        <h3 style="margin-top: 20px; color: var(--gold);">Grand Total: Rs. <span id="grand-total">0</span></h3>
    </div>
</section>

<script>
/* ================= DATA WITH PORTIONS ================= */
const menu = [
    { id:1, name:"Chicken Karahi", prices: {half: 900, full: 1600}, hasPortions: true, img:"https://images.unsplash.com/photo-1603496987351-f84a3ba5ec85?w=400"},
    { id:2, name:"Chicken Shinwari Karahi", prices: {half: 950, full: 1600}, hasPortions: true, img:"https://images.unsplash.com/photo-1626776876729-babd0f23583a?w=400"},
    { id:3, name:"Chicken Namkeen Karahi", prices: {half: 950, full: 1600}, hasPortions: true, img:"https://images.unsplash.com/photo-1545231027-63b3f162ad70?w=400"},
    { id:4, name:"Chicken Special Karahi", prices: {half: 1200, full: 2200}, hasPortions: true, img:"https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=400"},
    { id:5, name:"Mutton Karahi", prices: {half: 1500, full: 2800}, hasPortions: true, img:"https://images.unsplash.com/photo-1544025162-d76694265947?w=400"},
    { id:7, name:"Beef Pulao", price: 800, hasPortions: false, img:"https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=400"},
    { id:8, name:"Chicken Broast", price: 500, hasPortions: false, img:"https://images.unsplash.com/photo-1562967914-608f82629710?w=400"},
    { id:9, name:"Daal Mash", price: 200, hasPortions: false, img:"https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400"},
    { id:10, name:"Raita", price: 50, hasPortions: false, img:"https://images.unsplash.com/photo-1610192244261-3f33de3f55e4?w=400"},
    { id:11, name:"Karak Chai", price: 50, hasPortions: false, img:"https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?w=400"}
    // Note: Aap isi tarah baki 42 items bhi add kar saktay hain
];

let cart = [];
let sales = JSON.parse(localStorage.getItem("skr_sales")) || [];

function login(){
    if(document.getElementById("pass").value === "1234"){
        toggle("main-sec");
        renderItems(menu);
    } else { alert("Wrong Password"); }
}

function renderItems(data){
    document.getElementById("menu-container").innerHTML = `
    <div class="menu-grid">
        ${data.map(i => `
        <div class="item-card">
            <img src="${i.img}">
            <h3 style="margin-top:10px">${i.name}</h3>
            ${i.hasPortions ? 
                `<p class="price-tag">Half: ${i.prices.half} | Full: ${i.prices.full}</p>
                 <div class="portion-box">
                    <button class="btn" onclick="addToCart(${i.id}, 'half')">Add Half</button>
                    <button class="btn" onclick="addToCart(${i.id}, 'full')">Add Full</button>
                 </div>` : 
                `<p class="price-tag">Rs. ${i.price}</p>
                 <button class="btn" onclick="addToCart(${i.id}, 'single')">Add to Cart</button>`
            }
        </div>`).join("")}
    </div>`;
}

function addToCart(id, type){
    let item = menu.find(i => i.id === id);
    let orderItem = {
        name: item.name + (type !== 'single' ? ` (${type.toUpperCase()})` : ''),
        price: type === 'half' ? item.prices.half : (type === 'full' ? item.prices.full : item.price)
    };
    cart.push(orderItem);
    document.getElementById("count").innerText = cart.length;
}

function showCart(){
    if(!cart.length){alert("Cart is empty"); return;}
    toggle("cart-sec");
    let listHtml = cart.map((i, index) => `
        <div style="display:flex; justify-content:space-between; margin:10px 0; border-bottom:1px solid #333; padding-bottom:5px;">
            <span>${i.name}</span>
            <span>Rs. ${i.price} <i class="fas fa-trash" style="color:red; cursor:pointer; margin-left:10px;" onclick="removeItem(${index})"></i></span>
        </div>`).join("");
    document.getElementById("cart-list").innerHTML = listHtml;
    calculateTotal();
}

function removeItem(index) {
    cart.splice(index, 1);
    document.getElementById("count").innerText = cart.length;
    showCart();
}

function calculateTotal(){
    let itemsTotal = cart.reduce((a, b) => a + b.price, 0);
    let persons = parseInt(document.getElementById("personCount").value) || 0;
    let grandTotal = itemsTotal + (persons * 100);
    document.getElementById("total-val").innerText = grandTotal;
    return grandTotal;
}

function confirmOrder(){
    let finalAmount = calculateTotal();
    sales.push({
        time: new Date().toLocaleString(),
        total: finalAmount,
        details: cart.map(c => c.name).join(", ")
    });
    localStorage.setItem("skr_sales", JSON.stringify(sales));
    alert("Order Placed Successfully!");
    cart = [];
    document.getElementById("count").innerText = 0;
    document.getElementById("personCount").value = 0;
    goBack();
}

function showHistory(){
    toggle("hist-sec");
    let histHtml = sales.length ? sales.map(s => `
        <div style="margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px; font-size:0.9rem;">
            <div style="color:var(--gold)">${s.time}</div>
            <div>${s.details}</div>
            <div style="font-weight:bold">Total: Rs. ${s.total}</div>
        </div>`).join("") : "No history found";
    document.getElementById("hist-body").innerHTML = histHtml;
    document.getElementById("grand-total").innerText = sales.reduce((a, b) => a + b.total, 0);
}

function searchMenu(){
    let val = document.getElementById("searchInput").value.toLowerCase();
    renderItems(menu.filter(i => i.name.toLowerCase().includes(val)));
}

function toggle(id){
    ["login-sec", "main-sec", "cart-sec", "hist-sec"].forEach(s => {
        document.getElementById(s).classList.add("hidden");
    });
    document.getElementById(id).classList.remove("hidden");
}

function goBack(){ toggle("main-sec"); }
</script>

</body>
</html>
