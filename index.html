<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKR - Sher Alam Khan Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: var(--white); }
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: 2px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: 600; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: var(--dark); }
        .btn-danger { border-color: #ff4d4d; color: #ff4d4d; padding: 5px 10px; font-size: 0.8rem; }
        .btn-danger:hover { background: #ff4d4d; color: white; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Login */
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1552566626-52f8b828add9?w=1200'); background-size: cover; }
        .login-card { background: var(--gray); padding: 40px; border-radius: 15px; border: 1px solid var(--gold); width: 90%; max-width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; }

        /* Menu */
        .header-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--gold); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .food-card { background: var(--gray); border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .food-card:hover { border-color: var(--gold); }
        .food-info { padding: 15px; text-align: center; }
        .food-info h3 { color: var(--gold); margin-bottom: 10px; }
        .price { font-size: 1.2rem; font-weight: bold; color: #fff; margin-bottom: 15px; display: block; }

        /* Cart/Checkout */
        .checkout-box { background: var(--gray); padding: 30px; border-radius: 15px; }
        .order-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }
        
        /* Receipt */
        #bill-receipt { background: #fff; color: #000; padding: 30px; max-width: 450px; margin: 20px auto; font-family: monospace; border: 1px solid #ddd; }
        .receipt-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <section id="login-section">
        <div class="login-card">
            <h1 style="color: var(--gold); font-family: 'Playfair Display';">SKR</h1>
            <p style="margin-bottom: 20px;">Sher Alam Khan Restaurant</p>
            <input type="text" id="username" placeholder="Username (admin)">
            <input type="password" id="password" placeholder="Password (1234)">
            <button class="btn" onclick="handleLogin()">Enter Restaurant</button>
        </div>
    </section>

    <section id="menu-section" class="hidden">
        <div class="container">
            <div class="header-nav">
                <div>
                    <h2 style="color: var(--gold);">SKR MENU</h2>
                    <small><i class="fas fa-map-marker-alt"></i> Attock Petrol Pump, Bhakkar Road, DIK</small>
                </div>
                <button class="btn" onclick="showCheckout()"><i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)</button>
            </div>
            <div class="grid" id="food-grid"></div>
        </div>
    </section>

    <section id="checkout-section" class="hidden">
        <div class="container">
            <button class="btn" onclick="showMenu()" style="margin-bottom: 20px;">← Add More Items</button>
            <div class="checkout-box">
                <h2 style="color: var(--gold);">Your Selection</h2>
                <div id="order-list"></div>
                <div style="margin-top: 20px; text-align: right;">
                    <h3>Total Amount: Rs. <span id="order-total">0</span></h3>
                    <button class="btn" style="margin-top: 20px; background: var(--gold); color: black;" onclick="processBill()">Confirm Order & Generate Bill</button>
                </div>
            </div>
        </div>
    </section>

    <section id="bill-section" class="hidden">
        <div class="container">
            <div id="bill-receipt">
                <div class="receipt-header">
                    <h2>SKR RESTAURANT</h2>
                    <p>Sher Alam Khan Restaurant</p>
                    <p style="font-size: 0.8rem;">Attock Petrol Pump, Near Daman Hotel, Bhakkar Road, DIK</p>
                    <p id="receipt-date" style="font-size: 0.7rem;"></p>
                </div>
                <div id="receipt-items"></div>
                <div style="border-top: 1px dashed #000; margin-top: 10px; padding-top: 10px;">
                    <h3 style="display:flex; justify-content:space-between;">Total: <span>Rs. <span id="receipt-total"></span></span></h3>
                </div>
                <div style="text-align:center; margin-top: 20px;">
                    <p>Thank You For Visiting SKR!</p>
                    <button class="btn" onclick="window.print()" style="margin-top:10px; border-color: #000; color: #000;">Print Bill</button>
                    <button class="btn" onclick="location.reload()" style="margin-top:10px; border-color: #000; color: #000;">New Order</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const menuItems = [
            { id: 1, name: "Chicken Karahi (Full)", price: 1800 },
            { id: 2, name: "Mutton Karahi (Full)", price: 2800 },
            { id: 3, name: "Mutton Roast", price: 1500 },
            { id: 4, name: "Kabli Pulao", price: 600 },
            { id: 5, name: "Special Pulses (Daal)", price: 250 },
            { id: 6, name: "Mixed Vegetable", price: 300 },
            { id: 7, name: "Plain Rice", price: 200 },
            { id: 8, name: "Karak Chai", price: 100 },
            { id: 9, name: "Cold Drink (Regular)", price: 120 },
            { id: 10, name: "Water Bottle", price: 80 }
        ];

        let cart = [];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "admin" && pass === "1234") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('menu-section').classList.remove('hidden');
                renderMenu();
            } else { alert("Wrong ID/Password! Use admin / 1234"); }
        }

        function renderMenu() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = menuItems.map(item => `
                <div class="food-card">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="price">Rs. ${item.price}</span>
                        <button class="btn" onclick="addToCart(${item.id})">Add to Order</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            cart.push({ ...item, cartId: Date.now() }); // Unique ID for removing
            updateCartCount();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateCartCount();
            showCheckout(); // Refresh list
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function showCheckout() {
            if(cart.length === 0) { 
                alert("Cart is empty!"); 
                showMenu();
                return;
            }
            document.getElementById('menu-section').classList.add('hidden');
            document.getElementById('checkout-section').classList.remove('hidden');
            
            const list = document.getElementById('order-list');
            let total = 0;
            list.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div class="order-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <span>Rs. ${item.price}</span>
                        </div>
                        <button class="btn btn-danger" onclick="removeFromCart(${item.cartId})">Remove</button>
                    </div>
                `;
            }).join('');
            document.getElementById('order-total').innerText = total;
        }

        function showMenu() {
            document.getElementById('checkout-section').classList.add('hidden');
            document.getElementById('menu-section').classList.remove('hidden');
        }

        function processBill() {
            document.getElementById('checkout-section').classList.add('hidden');
            document.getElementById('bill-section').classList.remove('hidden');
            const receiptItems = document.getElementById('receipt-items');
            let total = 0;
            receiptItems.innerHTML = cart.map(item => {
                total += item.price;
                return `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${item.name}</span><span>${item.price}</span>
                </div>`;
            }).join('');
            document.getElementById('receipt-total').innerText = total;
            document.getElementById('receipt-date').innerText = new Date().toLocaleString();
        }
    </script>
</body>
</html>
